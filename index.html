<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashlet Test</title>
  <style> video{width:640px;height:360px;} </style>
</head>
<body>
  <video id="player" controls></video>

  <!-- 빌드한 라이브러리 -->
  <script src="/dashlet.js/dist/dash.all.min.js"></script>
  <script>
    (function () {
      const manifest = "/cdn-server/contentServer/dash/data/sample/manifest.mpd";              // CDN 경로
      const abrServer = "http://127.0.0.1:8333";                      // ABR server
      const player = dashjs.MediaPlayer().create();
      player.initialize(document.getElementById("player"), manifest, true);

      /* Dashlet 전용 ABR 훅  (dashlet.js 문서 참고) */
      player.updateSettings({
        streaming: {
          abr: {
            ABRServerURL: abrServer
          }
        }
      });
    })();
  </script>
</body>
</html>
